version: '3.8'

services:
  gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: fake-gcs
    ports:
      - "4443:4443"
    tmpfs:
      - /data
    command:
      - "-scheme"
      - "http"
      - "-port"
      - "4443"
      - "-filesystem-root"
      - "/data"
    restart: unless-stopped
